x-backend-env: &backend-env
  APP_NAME: mini-rag
  APP_VERSION: ${APP_VERSION:-1.0.0}
  ENVIRONMENT: ${ENVIRONMENT:-production}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  SECRET_KEY: ${SECRET_KEY}
  ADMIN_API_KEY: ${ADMIN_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-3.5-turbo}
  OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-ada-002}
  OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-1536}
  MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
  MONGO_DB_NAME: ${MONGO_DB_NAME:-minirag}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379}
  QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
  STORAGE_PATH: ${STORAGE_PATH:-storage}
  DEFAULT_CHUNK_SIZE: ${DEFAULT_CHUNK_SIZE:-800}
  DEFAULT_CHUNK_OVERLAP: ${DEFAULT_CHUNK_OVERLAP:-150}
  DEFAULT_TOP_K: ${DEFAULT_TOP_K:-5}
  DEFAULT_RETRIEVAL_STRATEGY: ${DEFAULT_RETRIEVAL_STRATEGY:-hybrid}
  DEFAULT_RATE_LIMIT_PER_HOUR: ${DEFAULT_RATE_LIMIT_PER_HOUR:-100}
  RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
  HF_HOME: ${HF_HOME:-/home/appuser/.cache/huggingface}
  SENTENCE_TRANSFORMERS_HOME: ${SENTENCE_TRANSFORMERS_HOME:-/home/appuser/.cache/huggingface/sentence-transformers}
  STARTUP_TIMEOUT_SECONDS: ${STARTUP_TIMEOUT_SECONDS:-60}
  SERVICE_CHECK_TIMEOUT_SECONDS: ${SERVICE_CHECK_TIMEOUT_SECONDS:-5}
  ALLOWED_ORIGINS: '${ALLOWED_ORIGINS:-["http://localhost","http://localhost:3000"]}'

x-env-file: &env-file
  - path: .env
    required: false

services:
  mongodb:
    image: mongo:7
    command: ["mongod", "--auth", "--bind_ip_all"]
    restart: unless-stopped
    env_file: *env-file
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-minirag}
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\" --quiet",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    env_file: *env-file
    volumes:
      - redis_data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    env_file: *env-file
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  fastapi:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: *env-file
    environment: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - model_cache:/home/appuser/.cache/huggingface
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "src.tasks.celery_app.celery_app",
        "worker",
        "--loglevel=INFO",
        "--queues=default,file_processing,data_indexing,evaluation",
        "--concurrency=2",
      ]
    restart: unless-stopped
    env_file: *env-file
    environment: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - model_cache:/home/appuser/.cache/huggingface
    networks:
      - app-network
    deploy:
      replicas: 2

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "src.tasks.celery_app.celery_app",
        "beat",
        "--loglevel=INFO",
        "--schedule=/tmp/celerybeat-schedule",
      ]
    restart: unless-stopped
    env_file: *env-file
    environment: *backend-env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_storage:/app/storage
      - model_cache:/home/appuser/.cache/huggingface
    networks:
      - app-network

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command:
      [
        "celery",
        "-A",
        "src.tasks.celery_app.celery_app",
        "flower",
        "--address=0.0.0.0",
        "--port=5555",
        "--url_prefix=flower",
      ]
    restart: unless-stopped
    env_file: *env-file
    environment: *backend-env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    volumes:
      - model_cache:/home/appuser/.cache/huggingface
    networks:
      - app-network

  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://fastapi:8000}
    restart: unless-stopped
    env_file: *env-file
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://fastapi:8000}
    depends_on:
      fastapi:
        condition: service_healthy
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    env_file: *env-file
    depends_on:
      fastapi:
        condition: service_healthy
      nextjs:
        condition: service_started
      flower:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  qdrant_data:
  backend_storage:
  model_cache:
