server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        application/json
        application/javascript
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/plain
        text/xml;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 300s;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api/health {
        proxy_pass http://fastapi:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /api/docs {
        proxy_pass http://fastapi:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /api/docs/ {
        proxy_pass http://fastapi:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /docs {
        proxy_pass http://fastapi:8000/docs;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /openapi.json {
        proxy_pass http://fastapi:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /api/openapi.json {
        proxy_pass http://fastapi:8000/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /api/query/stream {
        proxy_pass http://fastapi:8000/api/query/stream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
        proxy_set_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://fastapi:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /flower {
        return 301 /flower/;
    }

    location /flower/ {
        proxy_pass http://flower:5555;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
