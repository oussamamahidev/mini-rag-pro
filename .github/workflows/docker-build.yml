name: Docker Build

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: images
        shell: bash
        run: |
          image_prefix="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "backend=${image_prefix}-backend" >> "$GITHUB_OUTPUT"
          echo "frontend=${image_prefix}-frontend" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.backend }}:${{ github.sha }}
            ${{ steps.images.outputs.backend }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://fastapi:8000' }}
          tags: |
            ${{ steps.images.outputs.frontend }}:${{ github.sha }}
            ${{ steps.images.outputs.frontend }}:latest

      - name: Deployment tags
        run: |
          cat > image-tags.txt <<EOF
          BACKEND_IMAGE=${{ steps.images.outputs.backend }}:${{ github.sha }}
          FRONTEND_IMAGE=${{ steps.images.outputs.frontend }}:${{ github.sha }}
          EOF
          cat image-tags.txt

      - name: Upload deployment tags
        uses: actions/upload-artifact@v4
        with:
          name: image-tags
          path: image-tags.txt
